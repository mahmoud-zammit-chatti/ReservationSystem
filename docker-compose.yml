


services:

  postgres:
    image: postgres:16-alpine
    environment:
        POSTGRES_USER: ${DB_USERNAME}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}

    ports:
        - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .
    ports:
        - "8080:8080"
    depends_on:
        postgres:
            condition: service_healthy
    env_file:
      - .env

  # ----------------------------------------
  # NEW KEYCLOAK SERVICES
  # ----------------------------------------
  keycloak_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_PROXY: edge
      KEYCLOAK_ADMIN: ${KEYCLOACK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOACK_ADMIN_PASSWORD}
    command: start-dev
    ports:
      - "8081:8080" # Mapping to 8081 to avoid conflict with your Spring Boot app on 8080
    depends_on:
      - keycloak_db

volumes:
  postgres_data:
  keycloak_db_data: # Volume for Keycloak's DB
