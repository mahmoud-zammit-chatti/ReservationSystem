


services:

  postgres:
    image: postgres:16-alpine
    environment:
        POSTGRES_USER: ${DB_USERNAME}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}

    ports:
        - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .
    ports:
        - "8080:8080"
    depends_on:
        postgres:
            condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data: